name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm build

      - name: Install Capacitor
        run: pnpm add @capacitor/core @capacitor/cli @capacitor/android

      - name: Create capacitor config
        run: |
          cat > capacitor.config.ts << 'EOF'
          import { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.smarttransit.jordan',
            appName: 'SmartTransit Jordan',
            webDir: 'dist',
            server: { androidScheme: 'https' }
          };
          export default config;
          EOF

      - name: Init Capacitor
        run: npx cap init "SmartTransit Jordan" "com.smarttransit.jordan" --web-dir dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartTransit-Jordan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
